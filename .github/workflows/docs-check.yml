name: Docs Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  docs-check:
    name: Docs and repo hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List Markdown files
        run: |
          echo "Markdown files found:"
          find . -name "*.md" | sort || true

      - name: Check for obvious sensitive files
        run: |
          echo "Checking for files that should not be committed..."

          FOUND="$(find . \
            -path "./.git" -prune -o \
            \( \
              -name ".env" -o \
              -name ".env.local" -o \
              -name ".env.production" -o \
              -name ".env.*" -o \
              -name "*.pem" -o \
              -name "*.key" -o \
              -name "*.p12" -o \
              -name "*.pfx" -o \
              -name "id_rsa" -o \
              -name "id_ed25519" \
            \) -print)"

          if [ -n "$FOUND" ]; then
            echo "Potential sensitive files found:"
            echo "$FOUND"
            exit 1
          fi

          echo "No obvious sensitive files found."

      - name: Check for empty Markdown files
        run: |
          EMPTY_MD="$(find . -name "*.md" -type f -empty -print)"

          if [ -n "$EMPTY_MD" ]; then
            echo "Empty Markdown files found:"
            echo "$EMPTY_MD"
            exit 1
          fi

          echo "No empty Markdown files found."
